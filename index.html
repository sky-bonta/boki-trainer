<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>簿記トレーナー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">日商3級 問題対策</p>
      <h1>簿記トレーナー</h1>
    </div>
    <div class="stats" aria-live="polite">
      <span id="cardCount">0 / 0</span>
      <span id="weakCount">苦手 0</span>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="toolbar">
        <button class="mode is-active" data-mode="all">全カード</button>
        <button class="mode" data-mode="weak">苦手だけ</button>
      </div>
      <label class="search">
        <span>検索</span>
        <input id="searchInput" type="search" placeholder="第6問、利息、法人税など">
      </label>
      <nav id="cardList" class="card-list" aria-label="カード一覧"></nav>
    </aside>

    <section class="trainer">
      <div class="card-head">
        <div>
          <p id="sectionLabel" class="eyebrow"></p>
          <h2 id="cardTitle"></h2>
        </div>
        <button id="weakButton" class="icon-button" title="苦手に追加">☆</button>
      </div>

      <div class="prompt">
        <h3>問題</h3>
        <p id="questionText"></p>
      </div>

      <div class="answer-box">
        <button id="hint1Button">ヒント1</button>
        <button id="hint2Button">ヒント2</button>
        <button id="answerButton">模範解答</button>
      </div>

      <div id="hint1" class="reveal" hidden></div>
      <div id="hint2" class="reveal" hidden></div>
      <div id="answer" class="reveal answer" hidden></div>

      <div class="self-check">
        <button data-grade="good">できた</button>
        <button data-grade="almost">あやしい</button>
        <button data-grade="again">分からない</button>
      </div>

      <div class="pager">
        <button id="prevButton">前へ</button>
        <button id="nextButton">次へ</button>
      </div>
    </section>

    <aside class="source">
      <div class="source-head">
        <h2>紙面</h2>
        <button id="zoomButton">拡大</button>
      </div>
      <img id="sourceImage" alt="問題紙面">
    </aside>
  </main>

  <dialog id="imageDialog">
    <button id="closeDialog" class="dialog-close">閉じる</button>
    <img id="dialogImage" alt="拡大した問題紙面">
  </dialog>

  <script src="app.js"></script>
</body>
</html>
